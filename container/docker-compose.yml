version: '3.8'

services:
  # Apache PHP Application
  web:
    build:
      context: ..
      dockerfile: container/Dockerfile
    container_name: inventory_web
    env_file:
      - ../.env
    ports:
      - "8082:80"
    volumes:
      # Mount source code for development (comment out for production)
      - ../api:/var/www/html/api
      - ../config:/var/www/html/config
      - ../public:/var/www/html/public
      - ../scripts:/var/www/html/scripts
      - ../src:/var/www/html/src
      - ../vendor:/var/www/html/vendor
      - ../var/logs:/var/www/html/var/logs
      - ../var/sessions:/var/www/html/var/sessions
      - ../composer.json:/var/www/html/composer.json:ro
      - ../composer.lock:/var/www/html/composer.lock:ro
      - ../.htaccess:/var/www/html/.htaccess:ro
    environment:
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=inventory_system
      - MONGODB_USERNAME=${MONGODB_USERNAME}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_SSL=false
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - SESSION_LIFETIME=120
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - inventory_network
    restart: unless-stopped
    # Enable live reload for development
    develop:
      watch:
        - action: sync
          path: ../api
          target: /var/www/html/api
        - action: sync
          path: ../config
          target: /var/www/html/config
        - action: sync
          path: ../public
          target: /var/www/html/public
        - action: sync
          path: ../scripts
          target: /var/www/html/scripts
        - action: sync
          path: ../src
          target: /var/www/html/src
        - action: rebuild
          path: ../composer.json

  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: inventory_mongodb
    env_file:
      - ../.env
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./docker/mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_ROOT_PASSWORD:-adminpassword}
      - MONGO_INITDB_DATABASE=inventory_system
    networks:
      - inventory_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: ["--auth"]

  # MongoDB Express - Web-based MongoDB admin interface
  mongo-express:
    image: mongo-express:latest
    container_name: inventory_mongo_express
    env_file:
      - ../.env
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGODB_ROOT_USERNAME:-admin}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGODB_ROOT_PASSWORD:-adminpassword}
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGO_EXPRESS_USERNAME:-admin}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_EXPRESS_PASSWORD:-pass}
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - inventory_network
    restart: unless-stopped

networks:
  inventory_network:
    name: inventory
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
