version: '3.8'

# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # Apache PHP Application (Production)
  web:
    build:
      context: ..
      dockerfile: container/Dockerfile
      target: production
    container_name: inventory_web_prod
    restart: always
    ports:
      - "80:80"
    environment:
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=inventory_system
      - MONGODB_USERNAME=${MONGODB_USERNAME}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_SSL=false
      - APP_ENV=production
      - APP_DEBUG=false
      - SESSION_LIFETIME=120
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - inventory_network
    # No volume mounts in production - use built-in code
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MongoDB Database (Production)
  mongodb:
    image: mongo:7.0
    container_name: inventory_mongodb_prod
    restart: always
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./docker/mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=inventory_system
    networks:
      - inventory_network
    # Don't expose MongoDB port to host in production for security
    expose:
      - 27017
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    command: ["--auth"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  inventory_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
