; PHP Configuration for Production Environment

[PHP]
; Error handling (set display_errors = On for development)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/www/html/var/logs/php_errors.log

; Resource Limits
max_execution_time = 300
max_input_time = 300
memory_limit = 256M
post_max_size = 64M
upload_max_filesize = 64M

; Performance (opcache disabled for debugging)
; opcache.enable = 1
; opcache.enable_cli = 1
; opcache.memory_consumption = 128
; opcache.interned_strings_buffer = 8
; opcache.max_accelerated_files = 10000
; opcache.revalidate_freq = 2
; opcache.fast_shutdown = 1

; Session Configuration
session.save_handler = files
session.save_path = "/var/www/html/var/sessions"
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_secure = 0
session.use_only_cookies = 1
session.cookie_samesite = Lax
session.gc_maxlifetime = 7200
session.gc_probability = 1
session.gc_divisor = 100

; Security
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

; Date and Timezone
date.timezone = "Asia/Manila"

; File Uploads
file_uploads = On
max_file_uploads = 20

; MongoDB Extension
extension = mongodb.so

; Other useful extensions
extension = gd.so
extension = zip.so
extension = exif.so

; Increase limits for large data processing
max_input_vars = 3000
max_input_nesting_level = 128

; Realpath cache
realpath_cache_size = 4096K
realpath_cache_ttl = 600

[Date]
date.timezone = "Asia/Manila"

[Session]
session.name = INVENTORY_SESSION

[opcache]
; OPcache settings are already set above
